<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>학교 주변 맛집 지도</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .header {
      padding: 14px;
      background-color: #FEE500;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .tabs {
      display: flex;
    }

    .tab-button {
      flex: 1;
      padding: 14px;
      border: none;
      cursor: pointer;
      background-color: #eeeeee;
      font-size: 16px;
    }

    .tab-button.active {
      background-color: #333333;
      color: white;
    }

    #map {
      width: 100%;
      height: 650px;
    }

    .info-box {
      padding: 10px;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <div class="header">
    학교 주변 맛집 지도
  </div>

  <!-- 탭 영역 -->
  <div class="tabs">
    <button class="tab-button active" onclick="changeCategory('CT1', this)">
      양식
    </button>

    <button class="tab-button" onclick="changeCategory('MT1', this)">
      한식
    </button>
  </div>

  <!-- 지도 -->
  <div id="map"></div>

  <!-- 카카오맵 API -->
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=1e632b5f3aa3734e98cfb9cd29e7c748&libraries=services"></script>

  <script>

    // 학교 중심 좌표
    // 원하는 학교 위치로 변경 가능
    const schoolPosition = new kakao.maps.LatLng(37.6584, 126.8320);

    // 지도 생성
    const mapContainer = document.getElementById("map");

    const mapOption = {
      center: schoolPosition,
      level: 4
    };

    const map = new kakao.maps.Map(mapContainer, mapOption);

    // 장소 검색 객체
    const placeService = new kakao.maps.services.Places();

    // 마커 저장 배열
    let markers = [];

    // 현재 위치 마커
    let currentLocationMarker = null;

    // 인포윈도우
    const infoWindow = new kakao.maps.InfoWindow({
      zIndex: 1
    });

    // 카테고리별 마커 이미지
    const markerImages = {
      CT1: "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png",
      MT1: "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png"
    };

    // 현재 위치 표시
    function showCurrentLocation() {

      if (!navigator.geolocation) {
        alert("현재 위치를 사용할 수 없습니다.");
        return;
      }

      navigator.geolocation.getCurrentPosition(

        function(position) {

          const latitude = position.coords.latitude;
          const longitude = position.coords.longitude;

          const currentPosition = new kakao.maps.LatLng(latitude, longitude);

          // 기존 현재 위치 마커 제거
          if (currentLocationMarker) {
            currentLocationMarker.setMap(null);
          }

          // 현재 위치 마커 생성
          currentLocationMarker = new kakao.maps.Marker({
            map: map,
            position: currentPosition,
            title: "내 현재 위치"
          });

        },

        function() {
          alert("위치 권한을 허용해주세요.");
        }

      );
    }

    // 카테고리 검색
    function searchByCategory(categoryCode) {

      // 기존 마커 제거
      removeMarkers();

      // 카테고리 검색
      placeService.categorySearch(
        categoryCode,
        placesSearchCallback,
        {
          location: schoolPosition,
          radius: 1000
        }
      );
    }

    // 검색 결과 처리
    function placesSearchCallback(data, status) {

      if (status === kakao.maps.services.Status.OK) {

        const bounds = new kakao.maps.LatLngBounds();

        for (let i = 0; i < data.length; i++) {

          displayMarker(data[i]);

          bounds.extend(
            new kakao.maps.LatLng(data[i].y, data[i].x)
          );
        }

        map.setBounds(bounds);

      } else {

        alert("검색 결과가 없습니다.");

      }
    }

    // 마커 표시
    function displayMarker(place) {

      const position = new kakao.maps.LatLng(place.y, place.x);

      // 카테고리별 이미지 선택
      const imageSrc = getMarkerImage(place.category_group_code);

      const imageSize = new kakao.maps.Size(32, 32);

      const markerImage = new kakao.maps.MarkerImage(
        imageSrc,
        imageSize
      );

      // 마커 생성
      const marker = new kakao.maps.Marker({
        map: map,
        position: position,
        image: markerImage
      });

      // 마커 클릭 이벤트
      kakao.maps.event.addListener(marker, "click", function() {

        const content = `
          <div class="info-box">
            <strong>${place.place_name}</strong><br>
            ${place.road_address_name || place.address_name}<br>
            ${place.phone || "전화번호 없음"}
          </div>
        `;

        infoWindow.setContent(content);
        infoWindow.open(map, marker);

      });

      markers.push(marker);
    }

    // 카테고리별 마커 이미지 반환
    function getMarkerImage(categoryCode) {

      return markerImages[categoryCode]
        || markerImages.CT1;
    }

    // 기존 마커 제거
    function removeMarkers() {

      for (let i = 0; i < markers.length; i++) {
        markers[i].setMap(null);
      }

      markers = [];

      infoWindow.close();
    }

    // 탭 변경
    function changeCategory(categoryCode, clickedButton) {

      // 탭 active 제거
      const buttons = document.querySelectorAll(".tab-button");

      buttons.forEach(function(button) {
        button.classList.remove("active");
      });

      // 현재 탭 active 추가
      clickedButton.classList.add("active");

      // 새로운 카테고리 검색
      searchByCategory(categoryCode);
    }

    // 초기 실행
    showCurrentLocation();

    // 기본 탭 실행
    searchByCategory("CT1");

  </script>

</body>
</html>
