<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 검색 서비스</title>
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=1e632b5f3aa3734e98cfb9cd29e7c748&libraries=services&autoload=false"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }

        /* 화면 분할 레이아웃 */
        .main-container { display: flex; width: 100%; height: 100vh; }

        /* 왼쪽 검색창 및 리스트 */
        #sidebar {
            width: 300px;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ccc;
            background: #fff;
        }

        .search-area { padding: 15px; border-bottom: 2px solid #fee500; }
        .search-area input { width: 70%; padding: 8px; border: 1px solid #ddd; }
        .search-area button { width: 25%; padding: 8px; background: #fee500; border: none; cursor: pointer; font-weight: bold; }

        #result-list { flex: 1; overflow-y: auto; }
        .place-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .place-item:hover { background: #f9f9f9; }
        .place-item h4 { margin-bottom: 5px; font-size: 15px; }
        .place-item p { font-size: 12px; color: #777; }

        /* 오른쪽 지도 */
        #map-container { flex: 1; height: 100%; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="sidebar">
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="장소 검색..." onkeypress="if(event.keyCode==13) searchKeyword()">
            <button onclick="searchKeyword()">검색</button>
        </div>
        <div id="result-list"></div>
    </div>
    <div id="map-container"></div>
</div>

<script>
    let mapObject; 
    let placeSearchService; 
    let markerList = []; 

    // 1. SDK 로드 및 지도 초기화
    kakao.maps.load(function() {
        const container = document.getElementById('map-container');
        const options = {
            center: new kakao.maps.LatLng(37.5668, 126.9786), // 서울시청 기본값
            level: 5
        };

        mapObject = new kakao.maps.Map(container, options);
        
        // 장소 검색 서비스 객체 생성 (이게 로드되어야 검색이 가능함)
        placeSearchService = new kakao.maps.Services.Places();

        // 2. 현재 위치 권한 요청 및 이동
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const currentPos = new kakao.maps.LatLng(lat, lng);
                
                mapObject.setCenter(currentPos);
                new kakao.maps.Marker({ map: mapObject, position: currentPos }); // 현재 위치 표시
            });
        }
    });

    // 3. 검색 실행 함수
    function searchKeyword() {
        const word = document.getElementById('searchInput').value;

        if (!word.trim()) {
            alert("검색어를 입력해주세요!");
            return;
        }

        // 카카오 API로 검색 요청
        placeSearchService.keywordSearch(word, function(data, status) {
            if (status === kakao.maps.Services.Status.OK) {
                displaySearchResults(data);
            } else if (status === kakao.maps.Services.Status.ZERO_RESULT) {
                alert("검색 결과가 없습니다.");
            } else {
                alert("오류가 발생했습니다.");
            }
        });
    }

    // 4. 검색 결과 표시 함수
    function displaySearchResults(places) {
        const listContainer = document.getElementById('result-list');
        const bounds = new kakao.maps.LatLngBounds();

        // 기존 데이터 초기화
        listContainer.innerHTML = "";
        clearMarkers();

        places.forEach((place, index) => {
            const position = new kakao.maps.LatLng(place.y, place.x);
            
            // 마커 생성
            const marker = new kakao.maps.Marker({
                map: mapObject,
                position: position
            });
            markerList.push(marker);

            // 리스트 아이템 추가
            const item = document.createElement('div');
            item.className = 'place-item';
            item.innerHTML = `<h4>${place.place_name}</h4><p>${place.address_name}</p>`;
            
            // 아이템 클릭 시 해당 위치로 이동
            item.onclick = function() {
                mapObject.panTo(position);
            };

            listContainer.appendChild(item);
            bounds.extend(position); // 지도 범위 확장을 위해 좌표 추가
        });

        // 모든 검색 결과가 보이도록 지도 범위 조정
        mapObject.setBounds(bounds);
    }

    // 마커 제거 함수
    function clearMarkers() {
        markerList.forEach(m => m.setMap(null));
        markerList = [];
    }
</script>

</body>
</html>
