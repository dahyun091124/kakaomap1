<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>학교 주변 맛집 서비스</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Malgun Gothic', sans-serif;
      overflow: hidden;
    }

    .main-container {
      display: flex;
      width: 100%;
      height: 100vh;
      position: relative;
    }

    #sidebar {
      width: 350px;
      height: 100%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ccc;
      background: #fff;
      z-index: 10;
      flex-shrink: 0;
    }

    .tab-container {
      display: flex;
      background: #f1f1f1;
      border-bottom: 2px solid #ddd;
    }

    .tab-button {
      flex: 1;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      font-weight: bold;
      background: #e9e9e9;
      border: none;
      outline: none;
      transition: 0.3s;
    }

    .tab-button:hover {
      background: #ddd;
    }

    .tab-button.active {
      background: #fee500;
      color: #000;
      border-bottom: 2px solid #333;
    }

    #result-list {
      flex: 1;
      overflow-y: auto;
    }

    .place-item {
      padding: 15px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .place-item:hover {
      background: #f9f9f9;
    }

    .place-item h4 {
      margin: 0 0 5px 0;
      color: #222;
      font-size: 15px;
    }

    .place-item p {
      margin: 2px 0;
      font-size: 12px;
      color: #666;
    }

    #map {
      flex: 1;
      height: 100%;
    }

    .info-window {
      padding: 10px;
      font-size: 12px;
      line-height: 1.5;
      min-width: 150px;
    }
  </style>
</head>

<body>

  <div class="main-container">
    <div id="sidebar">
      <div class="tab-container">
        <button class="tab-button active" onclick="switchCategory('양식', this)">양식</button>
        <button class="tab-button" onclick="switchCategory('한식', this)">한식</button>
      </div>
      <div id="result-list">
        <p style="padding: 20px; text-align: center; color: #999;">위치 권한을 허용하면 맛집을 불러옵니다...</p>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1e632b5f3aa3734e98cfb9cd29e7c748&libraries=services&autoload=false"></script>

  <script>
    let mapObject;        
    let placeService;     
    let infoWindowObject; 
    let markerList = [];  
    let currentCenter;    
    let selectedKeyword = '양식'; 

    // 카카오맵 라이브러리 로드 후 시작
    kakao.maps.load(function() {
      const container = document.getElementById("map");

      // 기본 중심점을 먼저 서울시청으로 설정해둠
      const defaultPosition = new kakao.maps.LatLng(37.5665, 126.9780);
      const options = {
        center: defaultPosition, 
        level: 5 
      };

      mapObject = new kakao.maps.Map(container, options);
      placeService = new kakao.maps.Services.Places(); 
      infoWindowObject = new kakao.maps.InfoWindow({ zIndex: 1 }); 

      // 지도가 준비되자마자 브라우저에게 "위치 정보 허용 팝업"을 최우선으로 띄우게 만듦
      askLocationPermission();
    });

    // 최우선으로 위치 정보 권한을 물어보는 함수
    function askLocationPermission() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
          // 1. 사용자가 위치 허용을 눌렀을 때 실행되는 구간
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          currentCenter = new kakao.maps.LatLng(lat, lng);

          // 지도 중심을 내 현재 위치로 이동
          mapObject.setCenter(currentCenter);

          // 내 현재 위치에 빨간색 전용 마커 표시
          const centerMarkerImage = new kakao.maps.MarkerImage(
            'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png',
            new kakao.maps.Size(31, 35)
          );

          new kakao.maps.Marker({
            map: mapObject,
            position: currentCenter,
            image: centerMarkerImage,
            title: "내 현재 위치"
          });

          // 내 위치 기준으로 맛집 검색 시작
          searchPlaces();
        }, function(error) {
          // 2. 사용자가 위치 거부를 누르거나 오류가 났을 때 실행되는 안전장치 구간
          console.log("위치 권한 거부됨. 기본 서울시청 위치로 맛집을 찾습니다.");
          currentCenter = mapObject.getCenter(); 
          searchPlaces();
        });
      } else {
        // 브라우저가 위치 기능을 지원하지 않을 때
        currentCenter = mapObject.getCenter();
        searchPlaces();
      }
    }

    // 맛집 검색 요청 함수
    function searchPlaces() {
      if (!placeService || !currentCenter) return;

      // 음식점(FD6) 카테고리 고정 후 선택된 키워드(양식/한식)로 주변 2km 검색
      placeService.keywordSearch(selectedKeyword, placesSearchCallback, {
        location: currentCenter,
        radius: 2000,
        category_group_code: 'FD6'
      });
    }

    // 검색 결과 콜백 함수
    function placesSearchCallback(data, status) {
      const listContainer = document.getElementById('result-list');

      if (status === kakao.maps.Services.Status.OK) {
        displaySearchResults(data);
      } else if (status === kakao.maps.Services.Status.ZERO_RESULT) {
        listContainer.innerHTML = `<p style="padding: 20px; text-align: center; color: #999;">주변 반경 2km 내에 ${selectedKeyword} 맛집이 없습니다.</p>`;
      } else {
        listContainer.innerHTML = '<p style="padding: 20px; text-align: center; color: #999;">데이터 로드에 실패했습니다.</p>';
      }
    }

    // 검색 결과를 화면 리스트와 지도 마커로 바인딩하는 함수
    function displaySearchResults(places) {
      const listContainer = document.getElementById('result-list');
      const bounds = new kakao.maps.LatLngBounds();

      listContainer.innerHTML = ''; // 기존 리스트 초기화
      clearMarkers(); // 기존 마커 싹 지우기

      places.forEach((place) => {
        const placePosition = new kakao.maps.LatLng(place.y, place.x);
        
        const marker = createCategoryMarker(placePosition, selectedKeyword);
        const itemElement = createListItem(place);

        bounds.extend(placePosition);

        // 마커 클릭 시 팝업 띄우기
        kakao.maps.event.addListener(marker, 'click', function() {
          showInfoWindow(marker, place);
        });

        // 리스트 아이템 클릭 시 지도 이동 및 팝업 띄우기
        itemElement.onclick = function() {
          showInfoWindow(marker, place);
          mapObject.panTo(placePosition);
        };

        listContainer.appendChild(itemElement);
      });

      // 마커들이 한눈에 다 보이도록 지도 크기 자동 조절
      mapObject.setBounds(bounds);
    }

    // 카테고리별 마커 이미지 생성
    function createCategoryMarker(position, keyword) {
      let markerImageUrl = '';

      if (keyword === '양식') {
        markerImageUrl = 'https://t1.daumcdn.net/localimg/localimages/07/2012/img/marker_p.png'; // 초록핀
      } else if (keyword === '한식') {
        markerImageUrl = 'https://t1.daumcdn.net/mapjsapi/images/2x/marker.png'; // 파란핀
      }

      const markerImage = new kakao.maps.MarkerImage(markerImageUrl, new kakao.maps.Size(30, 38));

      const marker = new kakao.maps.Marker({
        position: position,
        image: markerImage,
        map: mapObject
      });

      markerList.push(marker);
      return marker;
    }

    // 리스트 아이템 디자인 구성 (이름, 주소, 전화번호)
    function createListItem(place) {
      const el = document.createElement('div');
      el.className = 'place-item';
      el.innerHTML = `
        <h4>${place.place_name}</h4>
        <p>${place.road_address_name || place.address_name}</p>
        <p style="color: #2b82d9; font-weight: bold;">${place.phone || '연락처 없음'}</p>
      `;
      return el;
    }

    // 인포윈도우 팝업 표시
    function showInfoWindow(marker, place) {
      const content = `
        <div class="info-window">
          <strong>${place.place_name}</strong><br>
          <span style="color:#666; font-size:11px;">${place.road_address_name || place.address_name}</span>
        </div>
      `;
      infoWindowObject.setContent(content);
      infoWindowObject.open(mapObject, marker);
    }

    // 마커 삭제 함수
    function clearMarkers() {
      markerList.forEach(marker => marker.setMap(null));
      markerList = [];
    }

    // 탭 클릭 시 카테고리 전환 함수
    function switchCategory(keyword, element) {
      const tabButtons = document.querySelectorAll('.tab-button');
      tabButtons.forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');

      selectedKeyword = keyword;
      infoWindowObject.close();

      searchPlaces();
    }
  </script>

</body>
</html>
