<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학교 주변 맛집 서비스</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .wrap {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 360px;
      min-width: 360px;
      background: #fff;
      border-right: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: #ffeb3b;
      padding: 18px 16px 16px;
      box-sizing: border-box;
    }

    .title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
      color: #222;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .btn-location {
      background: #222;
      color: #fff;
    }

    .btn-tab {
      background: #eee;
      color: #333;
    }

    .btn-tab.active {
      background: #2f6bff;
      color: #fff;
    }

    .status {
      padding: 14px 16px;
      font-size: 14px;
      color: #666;
      border-bottom: 1px solid #eee;
      line-height: 1.5;
    }

    .list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px 16px;
      box-sizing: border-box;
    }

    .item {
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fafafa;
      cursor: pointer;
    }

    .item:hover {
      background: #f0f6ff;
    }

    .name {
      font-size: 15px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }

    .meta {
      font-size: 13px;
      color: #555;
      line-height: 1.45;
    }

    .badge {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      color: #fff;
      vertical-align: middle;
    }

    .badge-ct1 { background: #6b7280; }
    .badge-mt1 { background: #ef4444; }

    #map {
      flex: 1;
      height: 100vh;
    }

    @media (max-width: 900px) {
      .wrap {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-width: 0;
        height: 42vh;
        border-right: none;
        border-bottom: 1px solid #e5e5e5;
      }

      #map {
        height: 58vh;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="sidebar">
      <div class="topbar">
        <h1 class="title">학교 주변 맛집 서비스</h1>
        <div class="btn-row">
          <button class="btn btn-location" id="locationBtn">내 현재 위치 표시</button>
          <button class="btn btn-tab active" id="tabCt1" data-category="CT1">양식</button>
          <button class="btn btn-tab" id="tabMt1" data-category="MT1">한식</button>
        </div>
      </div>

      <div class="status" id="statusText">현재 위치를 표시한 뒤 카테고리를 선택하세요.</div>
      <div class="list" id="resultList"></div>
    </div>

    <div id="map"></div>
  </div>

  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=1e632b5f3aa3734e98cfb9cd29e7c748&libraries=services"></script>
  <script>
    // 지도 초기 설정
    const mapContainer = document.getElementById('map');
    const mapOption = {
      center: new kakao.maps.LatLng(37.5665, 126.9780),
      level: 4
    };
    const map = new kakao.maps.Map(mapContainer, mapOption);
    const placesService = new kakao.maps.services.Places();

    // 상태 변수
    let currentPosition = null;
    let currentMarker = null;
    let currentCategory = 'CT1';
    let searchMarkers = [];
    let activeInfoWindow = null;
    let currentSearchResults = [];

    // DOM 요소
    const locationBtn = document.getElementById('locationBtn');
    const tabCt1 = document.getElementById('tabCt1');
    const tabMt1 = document.getElementById('tabMt1');
    const statusText = document.getElementById('statusText');
    const resultList = document.getElementById('resultList');

    // 마커 이미지 생성
    const markerImages = {
      CT1: createMarkerImage('#6b7280'),
      MT1: createMarkerImage('#ef4444'),
      current: createMarkerImage('#2563eb')
    };

    // 이벤트 연결
    locationBtn.addEventListener('click', showCurrentLocation);
    tabCt1.addEventListener('click', () => switchCategory('CT1'));
    tabMt1.addEventListener('click', () => switchCategory('MT1'));

    // 현재 위치 표시
    function showCurrentLocation(callback) {
      if (!navigator.geolocation) {
        alert('이 브라우저에서는 위치 정보를 사용할 수 없습니다.');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function (position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          currentPosition = { lat, lng };

          const locLatLng = new kakao.maps.LatLng(lat, lng);

          if (currentMarker) {
            currentMarker.setMap(null);
          }

          currentMarker = new kakao.maps.Marker({
            map: map,
            position: locLatLng,
            image: markerImages.current
          });

          const infoWindow = new kakao.maps.InfoWindow({
            content: '<div style="padding:6px 10px;font-size:13px;">현재 위치</div>'
          });

          infoWindow.open(map, currentMarker);
          map.setCenter(locLatLng);
          statusText.textContent = '현재 위치를 표시했습니다. 이제 카테고리를 선택하세요.';

          if (typeof callback === 'function') {
            callback();
          }
        },
        function () {
          alert('현재 위치를 가져오지 못했습니다.');
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    // 탭 전환
    function switchCategory(categoryCode) {
      currentCategory = categoryCode;

      tabCt1.classList.toggle('active', categoryCode === 'CT1');
      tabMt1.classList.toggle('active', categoryCode === 'MT1');

      clearSearchMarkers();
      resultList.innerHTML = '';
      statusText.textContent = '검색 중입니다...';

      if (!currentPosition) {
        showCurrentLocation(function () {
          searchByCategory(currentCategory, currentPosition.lat, currentPosition.lng);
        });
        return;
      }

      searchByCategory(currentCategory, currentPosition.lat, currentPosition.lng);
    }

    // 카테고리 검색
    function searchByCategory(categoryCode, lat, lng) {
      const location = new kakao.maps.LatLng(lat, lng);

      placesService.categorySearch(
        categoryCode,
        function (data, status) {
          clearSearchMarkers();
          resultList.innerHTML = '';

          if (status !== kakao.maps.services.Status.OK || !data || data.length === 0) {
            statusText.textContent = '검색 결과가 없습니다.';
            return;
          }

          currentSearchResults = data;
          renderPlaces(data, categoryCode);
          statusText.textContent = `총 ${data.length}개의 결과를 찾았습니다.`;
        },
        {
          location: location,
          radius: 1500,
          sort: kakao.maps.services.SortBy.DISTANCE
        }
      );
    }

    // 결과 렌더링
    function renderPlaces(places, categoryCode) {
      const bounds = new kakao.maps.LatLngBounds();

      places.forEach(function (place, index) {
        const lat = parseFloat(place.y);
        const lng = parseFloat(place.x);
        const position = new kakao.maps.LatLng(lat, lng);

        const marker = new kakao.maps.Marker({
          map: map,
          position: position,
          image: markerImages[categoryCode]
        });

        searchMarkers.push(marker);
        bounds.extend(position);

        const infoWindow = new kakao.maps.InfoWindow({
          content: `
            <div style="padding:8px 10px;font-size:13px;min-width:180px;">
              <strong>${place.place_name}</strong><br/>
              ${place.road_address_name || place.address_name || ''}
            </div>
          `
        });

        kakao.maps.event.addListener(marker, 'click', function () {
          if (activeInfoWindow) {
            activeInfoWindow.close();
          }
          infoWindow.open(map, marker);
          activeInfoWindow = infoWindow;
        });

        const item = document.createElement('div');
        item.className = 'item';
        item.innerHTML = `
          <div class="name">
            ${place.place_name}
            <span class="badge ${categoryCode === 'CT1' ? 'badge-ct1' : 'badge-mt1'}">${categoryCode}</span>
          </div>
          <div class="meta">
            ${place.category_name || ''}<br/>
            ${place.road_address_name || place.address_name || '주소 정보 없음'}<br/>
            ${place.phone || '전화번호 정보 없음'}
          </div>
        `;

        item.addEventListener('click', function () {
          if (activeInfoWindow) {
            activeInfoWindow.close();
          }
          infoWindow.open(map, marker);
          activeInfoWindow = infoWindow;
          map.panTo(position);
        });

        resultList.appendChild(item);
      });

      if (places.length > 0) {
        map.setBounds(bounds);
      }
    }

    // 기존 검색 마커 삭제
    function clearSearchMarkers() {
      searchMarkers.forEach(function (marker) {
        marker.setMap(null);
      });
      searchMarkers = [];

      activeInfoWindow = null;
    }

    // 색상 마커 생성
    function createMarkerImage(color) {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="46" viewBox="0 0 36 46">
          <path d="M18 46s14-16.2 14-28.2C32 8.8 25.7 2 18 2S4 8.8 4 17.8C4 29.8 18 46 18 46z" fill="${color}"/>
          <circle cx="18" cy="18" r="6.5" fill="white"/>
        </svg>
      `;
      const url = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
      return new kakao.maps.MarkerImage(url, new kakao.maps.Size(36, 46));
    }

    // 초기 실행
    showCurrentLocation(function () {
      searchByCategory(currentCategory, currentPosition.lat, currentPosition.lng);
    });
  </script>
</body>
</html>
