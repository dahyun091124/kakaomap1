<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>학교 주변 맛집 지도</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    #sidebar {
      width: 320px;
      padding: 15px;
      box-sizing: border-box;
      overflow-y: auto;
      border-right: 1px solid #ddd;
      background-color: #fafafa;
    }

    #map {
      flex: 1;
      height: 100vh;
    }

    .tab-button {
      width: 48%;
      padding: 10px;
      margin-bottom: 10px;
      border: none;
      cursor: pointer;
      background-color: #ddd;
      font-weight: bold;
      border-radius: 8px;
    }

    .tab-button.active {
      background-color: #ffcc00;
    }

    .place-item {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
    }

    .place-item:hover {
      background-color: #f0f0f0;
    }

    .place-name {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .place-address {
      font-size: 13px;
      color: #555;
    }
  </style>
</head>

<body>
  <div id="container">

    <!-- 왼쪽 정보 영역 -->
    <div id="sidebar">
      <h2>학교 주변 맛집</h2>

      <button id="cafeTab" class="tab-button active">카페</button>
      <button id="foodTab" class="tab-button">맛집</button>

      <div id="placeList"></div>
    </div>

    <!-- 지도 -->
    <div id="map"></div>
  </div>

  <!-- 카카오맵 API -->
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=1e632b5f3aa3734e98cfb9cd29e7c748&libraries=services"></script>

  <script>
    let map;
    let userMarker;
    let placeMarkers = [];
    let currentPosition;
    let currentCategory = "CE7";

    const placeList = document.getElementById("placeList");
    const cafeTab = document.getElementById("cafeTab");
    const foodTab = document.getElementById("foodTab");

    // 지도 초기화
    function initMap(latitude, longitude) {

      currentPosition = new kakao.maps.LatLng(latitude, longitude);

      const mapOption = {
        center: currentPosition,
        level: 4
      };

      map = new kakao.maps.Map(
        document.getElementById("map"),
        mapOption
      );

      // 현재 위치 표시
      showUserMarker();

      // 기본 검색 실행
      searchPlacesByCategory(currentCategory);
    }

    // 현재 위치 마커 표시
    function showUserMarker() {

      const markerImageSrc =
        "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png";

      const markerImageSize =
        new kakao.maps.Size(24, 35);

      const markerImage =
        new kakao.maps.MarkerImage(
          markerImageSrc,
          markerImageSize
        );

      userMarker = new kakao.maps.Marker({
        map: map,
        position: currentPosition,
        image: markerImage
      });

      const infoWindow = new kakao.maps.InfoWindow({
        content: '<div style="padding:6px;">내 현재 위치</div>'
      });

      kakao.maps.event.addListener(userMarker, "click", function () {
        infoWindow.open(map, userMarker);
      });
    }

    // 카테고리 검색
    function searchPlacesByCategory(categoryCode) {

      clearPlaceMarkers();

      placeList.innerHTML = "";

      const places = new kakao.maps.services.Places();

      places.categorySearch(
        categoryCode,
        placesSearchCallback,
        {
          location: currentPosition,
          radius: 1000,
          sort: kakao.maps.services.SortBy.DISTANCE
        }
      );
    }

    // 검색 결과 처리
    function placesSearchCallback(data, status) {

      if (status === kakao.maps.services.Status.OK) {

        data.forEach(function (place) {

          addPlaceMarker(place);

          addPlaceListItem(place);
        });

      } else {

        placeList.innerHTML =
          "<p>검색 결과가 없습니다.</p>";
      }
    }

    // 카테고리별 마커 생성
    function addPlaceMarker(place) {

      const position =
        new kakao.maps.LatLng(place.y, place.x);

      let markerImageSrc;

      // 카페
      if (currentCategory === "CE7") {

        markerImageSrc =
          "https://maps.google.com/mapfiles/ms/icons/blue-dot.png";
      }

      // 음식점
      else if (currentCategory === "FD6") {

        markerImageSrc =
          "https://maps.google.com/mapfiles/ms/icons/red-dot.png";
      }

      const markerImageSize =
        new kakao.maps.Size(32, 32);

      const markerImage =
        new kakao.maps.MarkerImage(
          markerImageSrc,
          markerImageSize
        );

      const marker = new kakao.maps.Marker({
        map: map,
        position: position,
        image: markerImage
      });

      // 인포윈도우
      const infoWindow = new kakao.maps.InfoWindow({
        content:
          `<div style="padding:6px;">${place.place_name}</div>`
      });

      kakao.maps.event.addListener(marker, "click", function () {

        infoWindow.open(map, marker);
      });

      placeMarkers.push(marker);
    }

    // 왼쪽 장소 목록 추가
    function addPlaceListItem(place) {

      const item = document.createElement("div");

      item.className = "place-item";

      item.innerHTML = `
        <div class="place-name">
          ${place.place_name}
        </div>

        <div class="place-address">
          ${place.road_address_name || place.address_name}
        </div>

        <div class="place-address">
          ${place.phone || "전화번호 없음"}
        </div>
      `;

      // 클릭 시 해당 위치 이동
      item.addEventListener("click", function () {

        const movePosition =
          new kakao.maps.LatLng(place.y, place.x);

        map.panTo(movePosition);
      });

      placeList.appendChild(item);
    }

    // 기존 마커 제거
    function clearPlaceMarkers() {

      placeMarkers.forEach(function (marker) {

        marker.setMap(null);
      });

      placeMarkers = [];
    }

    // 탭 active 변경
    function setActiveTab(selectedTab) {

      cafeTab.classList.remove("active");

      foodTab.classList.remove("active");

      selectedTab.classList.add("active");
    }

    // 카페 탭
    cafeTab.addEventListener("click", function () {

      currentCategory = "CE7";

      setActiveTab(cafeTab);

      searchPlacesByCategory(currentCategory);
    });

    // 맛집 탭
    foodTab.addEventListener("click", function () {

      currentCategory = "FD6";

      setActiveTab(foodTab);

      searchPlacesByCategory(currentCategory);
    });

    // 현재 위치 요청
    if (navigator.geolocation) {

      navigator.geolocation.getCurrentPosition(

        function (position) {

          const latitude =
            position.coords.latitude;

          const longitude =
            position.coords.longitude;

          initMap(latitude, longitude);
        },

        function () {

          alert(
            "위치 정보를 허용하지 않아 기본 위치로 이동합니다."
          );

          // 기본 위치
          initMap(37.6584, 126.8320);
        }
      );

    } else {

      alert(
        "이 브라우저에서는 위치 정보를 사용할 수 없습니다."
      );

      // 기본 위치
      initMap(37.6584, 126.8320);
    }
  </script>
</body>
</html>
