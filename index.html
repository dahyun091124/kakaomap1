<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>학교 주변 맛집 서비스</title>

  <style>
    /* 기본 여백 초기화 및 화면 전체 채우기 */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Malgun Gothic', sans-serif;
      overflow: hidden;
    }

    /* 화면을 왼쪽(사이드바)과 오른쪽(지도)으로 2분할 */
    .main-container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* 왼쪽 사이드바 스타일 */
    #sidebar {
      width: 350px;
      height: 100%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ccc;
      background: #fff;
      z-index: 10;
    }

    /* 카테고리 탭 스타일 */
    .tab-container {
      display: flex;
      background: #f1f1f1;
      border-bottom: 2px solid #ddd;
    }

    .tab-button {
      flex: 1;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      font-weight: bold;
      background: #e9e9e9;
      border: none;
      outline: none;
      transition: 0.3s;
    }

    .tab-button:hover {
      background: #ddd;
    }

    .tab-button.active {
      background: #fee500; /* 카카오 시그니처 노란색 */
      color: #000;
      border-bottom: 2px solid #333;
    }

    /* 검색 결과 리스트 영역 */
    #result-list {
      flex: 1;
      overflow-y: auto;
    }

    .place-item {
      padding: 15px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .place-item:hover {
      background: #f9f9f9;
    }

    .place-item h4 {
      margin: 0 0 5px 0;
      color: #222;
      font-size: 15px;
    }

    .place-item p {
      margin: 2px 0;
      font-size: 12px;
      color: #666;
    }

    /* 오른쪽 지도 영역 */
    #map {
      flex: 1;
      height: 100%;
    }

    /* 마커 클릭 시 나타나는 팝업(인포윈도우) 스타일 */
    .info-window {
      padding: 10px;
      font-size: 12px;
      line-height: 1.5;
      min-width: 150px;
    }
  </style>
</head>

<body>

  <div class="main-container">
    <div id="sidebar">
      <div class="tab-container">
        <button class="tab-button active" onclick="switchCategory('CT1', this)">양식</button>
        <button class="tab-button" onclick="switchCategory('MT1', this)">한식</button>
      </div>
      <div id="result-list">
        <p style="padding: 20px; text-align: center; color: #999;">주변 맛집을 불러오는 중입니다...</p>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1e632b5f3aa3734e98cfb9cd29e7c748&libraries=services&autoload=false"></script>

  <script>
    let mapObject;        // 지도 객체
    let placeService;     // 장소 검색 서비스 객체
    let infoWindowObject; // 마커 팝업창 객체
    let markerList = [];  // 맛집 마커들을 담을 배열
    let currentCenter;    // 접속자의 현재 위치 좌표 저장 변수
    let selectedCategory = 'CT1'; // 처음 선택된 카테고리 (양식 기본값)

    // 1. 카카오 라이브러리가 완전히 다운로드된 후 실행
    kakao.maps.load(function() {
      const container = document.getElementById("map");

      const options = {
        center: new kakao.maps.LatLng(37.5665, 126.9780), // 위치 권한 허용 전 기본 중심(서울시청)
        level: 5 // 요구사항 확대 레벨 5
      };

      mapObject = new kakao.maps.Map(container, options);
      placeService = new kakao.maps.Services.Places(); // 장소 검색 객체 생성
      infoWindowObject = new kakao.maps.InfoWindow({ zIndex: 1 }); // 팝업창 객체 생성

      // 2. 기획서 기능 1: 내 현재 위치 찾아서 지도에 표시하기
      getCurrentLocation();
    });

    // 현재 위치를 탐색하는 함수
    function getCurrentLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          currentCenter = new kakao.maps.LatLng(lat, lng);

          // 내 현재 위치로 지도 중심 이동
          mapObject.setCenter(currentCenter);

          // 기획서 기능 1: 내 현재 위치를 알려주는 전용 마커 표시 (식당 마커와
