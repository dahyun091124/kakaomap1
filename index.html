<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=1e632b5f3aa3734e98cfb9cd29e7c748&libraries=services&autoload=false"></script>
    <style>
        /* 기본 레이아웃 설정 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        .main-container { display: flex; width: 100%; height: 100vh; }

        /* 왼쪽 사이드바 디자인 */
        #sidebar {
            width: 350px; height: 100%; background: #fff;
            display: flex; flex-direction: column; border-right: 1px solid #ddd;
        }
        .search-header { padding: 20px; background: #fee500; }
        .search-header input { width: 75%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .search-header button { width: 20%; padding: 10px; background: #333; color: #fff; border: none; cursor: pointer; border-radius: 4px; }

        /* 결과 리스트 영역 */
        #result-list { flex: 1; overflow-y: auto; }
        .place-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .place-item:hover { background: #f9f9f9; }
        .place-item h4 { color: #222; margin-bottom: 5px; }
        .place-item p { font-size: 13px; color: #666; margin: 2px 0; }

        /* 오른쪽 지도 영역 */
        #map-area { flex: 1; height: 100%; }

        /* 인포윈도우(팝업) 스타일 */
        .info-window { padding: 10px; font-size: 12px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="sidebar">
        <div class="search-header">
            <input type="text" id="keyword" placeholder="장소 검색 (예: 강남역 맛집)" onkeypress="if(event.keyCode==13) searchPlaces()">
            <button onclick="searchPlaces()">검색</button>
        </div>
        <div id="result-list">
            <p style="padding: 20px; text-align: center; color: #999;">검색어를 입력하고 버튼을 눌러주세요.</p>
        </div>
    </div>
    <div id="map-area"></div>
</div>

<script>
    let map; // 지도 객체
    let ps;  // 장소 검색 객체
    let infowindow; // 마커 클릭 시 팝업창
    let markers = []; // 마커 관리 배열

    // 1. 지도 로딩 전 안전하게 실행하기 위해 autoload=false 사용
    kakao.maps.load(function() {
        const container = document.getElementById('map-area');
        const options = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 기본 좌표
            level: 5 // 확대 레벨
        };

        map = new kakao.maps.Map(container, options);
        ps = new kakao.maps.Services.Places(); // 장소 검색 객체 생성
        infowindow = new kakao.maps.InfoWindow({ zIndex: 1 }); // 팝업 객체 생성

        // 2. 현재 위치 가져와서 지도 중심 이동
        getCurrentPos();
    });

    // 현재 위치를 확인하는 함수
    function getCurrentPos() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const moveLatLon = new kakao.maps.LatLng(lat, lon);
                map.setCenter(moveLatLon);
            });
        }
    }

    // 장소 검색 실행 함수
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;

        if (!keyword.replace(/^\s+|\s+$/g, '')) {
            alert('키워드를 입력해주세요!');
            return;
        }

        // 카카오 API로 검색 요청
        ps.keywordSearch(keyword, placesSearchCB);
    }

    // 장소 검색 결과가 왔을 때 실행되는 콜백 함수
    function placesSearchCB(data, status, pagination) {
        if (status === kakao.maps.Services.Status.OK) {
            displayResults(data); // 결과 표시
        } else if (status === kakao.maps.Services.Status.ZERO_RESULT) {
            alert('검색 결과가 없습니다.');
        } else {
            alert('검색 중 오류가 발생했습니다.');
        }
    }

    // 결과 목록과 마커를 화면에 표시하는 함수
    function displayResults(places) {
        const listEl = document.getElementById('result-list');
        const bounds = new kakao.maps.LatLngBounds();

        // 이전 결과 및 마커 지우기
        listEl.innerHTML = '';
        removeMarkers();

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            const marker = addMarker(placePosition);
            const itemEl = getListItem(i, places[i]);

            // 검색된 장소 위치를 기준으로 지도 범위 재설정하기 위해 좌표 추가
            bounds.extend(placePosition);

            // 마커와 리스트 아이템에 클릭 이벤트 추가 (팝업 표시)
            (function(marker, place) {
                kakao.maps.event.addListener(marker, 'click', function() {
                    displayInfoWindow(marker, place);
                });

                itemEl.onclick = function() {
                    displayInfoWindow(marker, place);
                    map.panTo(placePosition); // 부드럽게 해당 위치로 이동
                };
            })(marker, places[i]);

            listEl.appendChild(itemEl);
        }

        // 모든 검색 결과가 보이도록 지도 크기 조절
        map.setBounds(bounds);
    }

    // 리스트 아이템 HTML 생성 함수
    function getListItem(index, place) {
        const el = document.createElement('div');
        el.className = 'place-item';
        // 카카오 API는 영업시간 데이터는 제공하지 않으므로 전화번호를 배치
        el.innerHTML = `
            <h4>${place.place_name}</h4>
            <p>${place.road_address_name || place.address_name}</p>
            <p style="color: #2b82d9;">${place.phone || '전화번호 정보 없음'}</p>
        `;
        return el;
    }

    // 마커 생성 함수
    function addMarker(position) {
        const marker = new kakao.maps.Marker({
            position: position,
            map: map
        });
        markers.push(marker);
        return marker;
    }

    // 기존 마커 전체 삭제
    function removeMarkers() {
        markers.forEach(m => m.setMap(null));
        markers = [];
    }

    // 인포윈도우(팝업) 표시 함수
    function displayInfoWindow(marker, place) {
        const content = `
            <div class="info-window">
                <strong>${place.place_name}</strong><br>
                ${place.road_address_name || place.address_name}<br>
                ${place.phone}
            </div>
        `;
        infowindow.setContent(content);
        infowindow.open(map, marker);
    }
</script>

</body>
</html>
