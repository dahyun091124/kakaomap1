<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>학교 주변 맛집 서비스</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Malgun Gothic', sans-serif;
      overflow: hidden;
    }

    .main-container {
      display: flex;
      width: 100%;
      height: 100vh;
      position: relative;
    }

    #sidebar {
      width: 350px;
      height: 100%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ccc;
      background: #fff;
      z-index: 10;
      flex-shrink: 0;
    }

    .tab-container {
      display: flex;
      background: #f1f1f1;
      border-bottom: 2px solid #ddd;
    }

    .tab-button {
      flex: 1;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      font-weight: bold;
      background: #e9e9e9;
      border: none;
      outline: none;
      transition: 0.3s;
    }

    .tab-button:hover {
      background: #ddd;
    }

    .tab-button.active {
      background: #fee500;
      color: #000;
      border-bottom: 2px solid #333;
    }

    #result-list {
      flex: 1;
      overflow-y: auto;
    }

    .place-item {
      padding: 15px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .place-item:hover {
      background: #f9f9f9;
    }

    .place-item h4 {
      margin: 0 0 5px 0;
      color: #222;
      font-size: 15px;
    }

    .place-item p {
      margin: 2px 0;
      font-size: 12px;
      color: #666;
    }

    #map {
      flex: 1;
      height: 100%;
    }

    .info-window {
      padding: 10px;
      font-size: 12px;
      line-height: 1.5;
      min-width: 150px;
    }
  </style>
</head>

<body>

  <div class="main-container">
    <div id="sidebar">
      <div class="tab-container">
        <button class="tab-button active" onclick="switchCategory('CT1', this)">양식</button>
        <button class="tab-button" onclick="switchCategory('MT1', this)">한식</button>
      </div>
      <div id="result-list">
        <p style="padding: 20px; text-align: center; color: #999;">주변 맛집을 불러오는 중입니다...</p>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1e632b5f3aa3734e98cfb9cd29e7c748&libraries=services&autoload=false"></script>

  <script>
    let mapObject;        
    let placeService;     
    let infoWindowObject; 
    let markerList = [];  
    let currentCenter;    
    let selectedCategory = 'CT1'; 

    kakao.maps.load(function() {
      const container = document.getElementById("map");

      const options = {
        center: new kakao.maps.LatLng(37.5665, 126.9780), 
        level: 5 
      };

      mapObject = new kakao.maps.Map(container, options);
      placeService = new kakao.maps.Services.Places(); 
      infoWindowObject = new kakao.maps.InfoWindow({ zIndex: 1 }); 

      // 지도가 생성된 직후 기본 중심점으로 먼저 검색을 한 번 실행해 둡니다 (하얀 화면 방지)
      currentCenter = mapObject.getCenter();
      searchPlacesByCategory();

      // 그 다음 현재 위치 업데이트 시도
      getCurrentLocation();
    });

    function getCurrentLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          currentCenter = new kakao.maps.LatLng(lat, lng);

          mapObject.setCenter(currentCenter);

          const centerMarkerImage = new kakao.maps.MarkerImage(
            'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png',
            new kakao.maps.Size(31, 35)
          );

          new kakao.maps.Marker({
            map: mapObject,
            position: currentCenter,
            image: centerMarkerImage,
            title: "내 현재 위치"
          });

          // 내 위치 찾으면 해당 위치 기준으로 다시 검색
          searchPlacesByCategory();
        }, function(error) {
          console.log("위치 권한 거부 또는 획득 실패. 기본 위치를 사용합니다.");
        });
      }
    }

    function switchCategory(categoryCode, element) {
      const tabButtons = document.querySelectorAll('.tab-button');
      tabButtons.forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');

      selectedCategory = categoryCode;

      clearMarkers();
      infoWindowObject.close();

      searchPlacesByCategory();
    }

    function searchPlacesByCategory() {
      if (!currentCenter || !placeService) return;

      placeService.categorySearch(selectedCategory, placesSearchCallback, {
        location: currentCenter,
        radius: 2000
      });
    }

    function placesSearchCallback(data, status) {
      const listContainer = document.getElementById('result-list');

      if (status === kakao.maps.Services.Status.OK) {
        displaySearchResults(data);
      } else if (status === kakao.maps.Services.Status.ZERO_RESULT) {
        listContainer.innerHTML = '<p style="padding: 20px; text-align: center; color: #999;">주변 반경에 매장이 없습니다.</p>';
      } else {
        listContainer.innerHTML = '<p style="padding: 20px; text-align: center; color: #999;">API 호출 오류가 발생했습니다.</p>';
      }
    }

    function displaySearchResults(places) {
      const listContainer = document.getElementById('result-list');
      const bounds = new kakao.maps.LatLngBounds();

      listContainer.innerHTML = ''; 

      places.forEach((place) => {
        const placePosition = new kakao.maps.LatLng(place.y, place.x);
        
        const marker = createCategoryMarker(placePosition, selectedCategory);
        const itemElement = createListItem(place);

        bounds.extend(placePosition);

        kakao.maps.event.addListener(marker, 'click', function() {
          showInfoWindow(marker, place);
        });

        itemElement.onclick = function() {
          showInfoWindow(marker, place);
          mapObject.panTo(placePosition);
        };

        listContainer.appendChild(itemElement);
      });

      mapObject.setBounds(bounds);
    }

    function createCategoryMarker(position, category) {
      let markerImageUrl = '';

      if (category === 'CT1') {
        markerImageUrl = 'https://t1.daumcdn.net/localimg/localimages/07/2012/img/marker_p.png';
      } else if (category === 'MT1') {
        markerImageUrl = 'https://t1.daumcdn.net/mapjsapi/images/2x/marker.png';
      }

      const markerImage = new kakao.maps.MarkerImage(markerImageUrl, new kakao.maps.Size(30, 38));

      const marker = new kakao.maps.Marker({
        position: position,
        image: markerImage,
        map: mapObject
      });

      markerList.push(marker);
      return marker;
    }

    function createListItem(place) {
      const el = document.createElement('div');
      el.className = 'place-item';
      el.innerHTML = `
        <h4>${place.place_name}</h4>
        <p>${place.road_address_name || place.address_name}</p>
        <p style="color: #2b82d9; font-weight: bold;">${place.phone || '연락처 없음'}</p>
      `;
      return el;
    }

    function showInfoWindow(marker, place) {
      const content = `
        <div class="info-window">
          <strong>${place.place_name}</strong><br>
          <span style="color:#666; font-size:11px;">${place.road_address_name || place.address_name}</span>
        </div>
      `;
      infoWindowObject.setContent(content);
      infoWindowObject.open(mapObject, marker);
    }

    function clearMarkers() {
      markerList.forEach(marker => marker.setMap(null));
      markerList = [];
    }
  </script>

</body>
</html>
