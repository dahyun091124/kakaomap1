<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>카카오맵 테스트</title>

  <style>
    /* 여백을 없애고 화면 전체를 채우도록 설정 */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>

  <div id="map"></div>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1e632b5f3aa3734e98cfb9cd29e7c748&autoload=false"></script>

  <script>
    // kakao.maps.load() 함수를 사용해서 API가 완벽히 다운로드된 후 지도를 생성합니다.
    kakao.maps.load(function() {
      const container = document.getElementById("map");

      const options = {
        center: new kakao.maps.LatLng(37.5665, 126.9780), // 서울시청 중심 좌표
        level: 3 // 확대 레벨
      };

      // 지도 객체 생성
      const map = new kakao.maps.Map(container, options);
    });
  </script>

</body>
</html>
