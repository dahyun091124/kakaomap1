<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 카카오맵 검색 서비스</title>
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=1e632b5f3aa3734e98cfb9cd29e7c748&libraries=services&autoload=false"></script>
    <style>
        /* 기본 스타일 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', dotum, sans-serif; }

        /* 화면을 왼쪽(사이드바)과 오른쪽(지도)으로 2분할 */
        .container { display: flex; width: 100%; height: 100vh; }

        /* 왼쪽 검색창 및 결과 리스트 영역 */
        #sidebar {
            width: 350px;
            height: 100%;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
            z-index: 10;
        }

        .search-box { padding: 20px; background: #fff; border-bottom: 1px solid #eee; }
        .search-box input { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .search-box button { width: 25%; padding: 10px; background: #fee500; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }

        #result-list { flex: 1; overflow-y: auto; padding: 10px; }
        .item { padding: 15px; border-bottom: 1px solid #ddd; cursor: pointer; }
        .item:hover { background: #eee; }
        .item h5 { color: #333; margin-bottom: 5px; }
        .item p { font-size: 12px; color: #666; }

        /* 오른쪽 지도 영역 */
        #map { flex: 1; height: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div id="sidebar">
        <div class="search-box">
            <input type="text" id="keyword" placeholder="장소를 입력하세요" onkeypress="if(event.keyCode==13) searchPlaces()">
            <button onclick="searchPlaces()">검색</button>
        </div>
        <div id="result-list">
            <p style="text-align: center; color: #999; margin-top: 20px;">검색 결과가 여기에 표시됩니다.</p>
        </div>
    </div>

    <div id="map"></div>
</div>

<script>
    let map;
    let ps; // 장소 검색 객체

    kakao.maps.load(function() {
        const container = document.getElementById('map');
        const options = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 기본 좌표(서울시청)
            level: 5 // 요청하신 확대 레벨 5
        };

        map = new kakao.maps.Map(container, options);
        ps = new kakao.maps.Services.Places(); // 장소 검색 객체 초기화

        // 2. 현재 위치 가져오기
        getCurrentLocation();
    });

    // 현재 위치를 확인하여 지도의 중심을 옮기는 함수
    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const locPosition = new kakao.maps.LatLng(lat, lon);

                map.setCenter(locPosition); // 현재 위치로 지도 중심 이동
                displayMarker(locPosition, "내 위치"); // 내 위치에 마커 표시
            }, function(error) {
                console.error("위치 권한 거부 또는 오류:", error);
                alert("현재 위치를 가져올 수 없어 기본 위치로 설정합니다.");
            });
        }
    }

    // 지도에 마커를 표시하는 함수
    function displayMarker(position, title) {
        const marker = new kakao.maps.Marker({
            map: map,
            position: position
        });
        
        // 검색 결과 마커 관리를 위해 배열에 추가
        markers.push(marker);
        return marker;
    }

    // 장소 검색 함수
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;

        if (!keyword.replace(/^\s+|\s+$/g, '')) {
            alert('키워드를 입력해주세요!');
            return;
        }

        // 카카오 검색 서비스 이용
        ps.keywordSearch(keyword, placesSearchCB);
    }

    // 장소 검색 완료 시 호출되는 콜백 함수
    function placesSearchCB(data, status, pagination) {
        if (status === kakao.maps.Services.Status.OK) {
            displayPlaces(data);
        } else if (status === kakao.maps.Services.Status.ZERO_RESULT) {
            alert('검색 결과가 존재하지 않습니다.');
        } else if (status === kakao.maps.Services.Status.ERROR) {
            alert('검색 결과 중 오류가 발생했습니다.');
        }
    }

    // 검색 결과 목록과 마커를 표출하는 함수
    function displayPlaces(places) {
        const listEl = document.getElementById('result-list');
        const bounds = new kakao.maps.LatLngBounds();
        
        // 기존 검색 결과 및 마커 제거
        listEl.innerHTML = '';
        removeMarkers();

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            const marker = displayMarker(placePosition);
            const itemEl = getListItem(i, places[i]);

            // 검색된 장소 위치를 기준으로 지도 범위 재설정
            bounds.extend(placePosition);

            // 리스트 아이템 클릭 시 지도 이동
            itemEl.onclick = function() {
                map.panTo(placePosition);
            };

            listEl.appendChild(itemEl);
        }
        map.setBounds(bounds); // 검색된 결과들이 다 보이도록 지도 범위 조정
    }
