<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학교 주변 맛집 서비스</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .wrap {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 360px;
      min-width: 360px;
      background: #fff;
      border-right: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: #ffeb3b;
      padding: 18px 16px 16px;
      box-sizing: border-box;
    }

    .title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
      color: #222;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .btn-location {
      background: #222;
      color: #fff;
    }

    .btn-tab {
      background: #eee;
      color: #333;
    }

    .btn-tab.active {
      background: #2f6bff;
      color: #fff;
    }

    .status {
      padding: 14px 16px;
      font-size: 14px;
      color: #666;
      border-bottom: 1px solid #eee;
      line-height: 1.5;
    }

    .list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px 16px;
      box-sizing: border-box;
    }

    .item {
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fafafa;
      cursor: pointer;
    }

    .item:hover {
      background: #f0f6ff;
    }

    .name {
      font-size: 15px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }

    .meta {
      font-size: 13px;
      color: #555;
      line-height: 1.45;
    }

    .badge {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      color: #fff;
      vertical-align: middle;
    }

    .badge-ct1 { background: #6b7280; }
    .badge-mt1 { background: #ef4444; }

    #map {
      flex: 1;
      height: 100vh;
      background: #ddd;
    }

    @media (max-width: 900px) {
      .wrap {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-width: 0;
        height: 42vh;
        border-right: none;
        border-bottom: 1px solid #e5e5e5;
      }

      #map {
        height: 58vh;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="sidebar">
      <div class="topbar">
        <h1 class="title">학교 주변 맛집 서비스</h1>
        <div class="btn-row">
          <button class="btn btn-location" id="locationBtn">내 현재 위치 표시</button>
          <button class="btn btn-tab active" id="tabCt1" data-category="CT1">양식</button>
          <button class="btn btn-tab" id="tabMt1" data-category="MT1">한식</button>
        </div>
      </div>

      <div class="status" id="statusText">현재 위치를 표시한 뒤 카테고리를 선택하세요.</div>
      <div class="list" id="resultList"></div>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1e632b5f3aa3734e98cfb9cd29e7c748&libraries=services&autoload=false"></script>
  <script>
    let map;
    let placesService;
    let currentPosition = null;
    let currentMarker = null;
    let currentCategory = 'CT1';
    let searchMarkers = [];
    let activeInfoWindow = null;

    const markerImages = {
      CT1: null,
      MT1: null,
      current: null
    };

    const locationBtn = document.getElementById('locationBtn');
    const tabCt1 = document.getElementById('tabCt1');
    const tabMt1 = document.getElementById('tabMt1');
    const statusText = document.getElementById('statusText');
    const resultList = document.getElementById('resultList');

    kakao.maps.load(function () {
      initMap();
      bindEvents();
      showCurrentLocation(function () {
        searchByCategory(currentCategory, currentPosition.lat, currentPosition.lng);
      });
    });

    function initMap() {
      const mapContainer = document.getElementById('map');
      const mapOption = {
        center: new kakao.maps.LatLng(37.5665, 126.9780),
        level: 4
      };

      map = new kakao.maps.Map(mapContainer, mapOption);
      placesService = new kakao.maps.services.Places();

      markerImages.CT1 = createMarkerImage('#6b7280');
      markerImages.MT1 = createMarkerImage('#ef4444');
      markerImages.current = createMarkerImage('#2563eb');
    }

    function bindEvents() {
      locationBtn.addEventListener('click', showCurrentLocation);
      tabCt1.addEventListener('click', function () {
        switchCategory('CT1');
      });
      tabMt1.addEventListener('click', function () {
        switchCategory('MT1');
      });
    }

    function showCurrentLocation(callback) {
      if (!navigator.geolocation) {
        alert('이 브라우저에서는 위치 정보를 사용할 수 없습니다.');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function (position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          currentPosition = { lat, lng };

          const locLatLng = new kakao.maps.LatLng(lat, lng);

          if (currentMarker) {
            currentMarker.setMap(null);
          }

          currentMarker = new kakao.maps.Marker({
            map: map,
            position: locLatLng,
            image: markerImages.current
          });

          const infoWindow = new kakao.maps.InfoWindow({
            content: '<div style="padding:6px 10px;font-size:13px;">현재 위치</div>'
          });

          infoWindow.open(map, currentMarker);
          map.setCenter(locLatLng);
          statusText.textContent = '현재 위치를 표시했습니다. 이제 카테고리를 선택하세요.';

          if (typeof callback === 'function') callback();
        },
        function () {
          alert('현재 위치를 가져오지 못했습니다.');
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    function switchCategory(categoryCode) {
      currentCategory = categoryCode;

      tabCt1.classList.toggle('active', categoryCode === 'CT1');
      tabMt1.classList.toggle('active', categoryCode === 'MT1');

      clearSearchMarkers();
      resultList.innerHTML = '';
      statusText.textContent = '검색 중입니다...';

      if (!currentPosition) {
        showCurrentLocation(function () {
          searchByCategory(currentCategory, currentPosition.lat, currentPosition.lng);
        });
        return;
      }

      searchByCategory(currentCategory, currentPosition.lat, currentPosition.lng);
    }

    function searchByCategory(categoryCode, lat, lng) {
      const location = new kakao.maps.LatLng(lat, lng);

      placesService.categorySearch(
        categoryCode,
        function (data, status) {
          clearSearchMarkers();
          resultList.innerHTML = '';

          if (status !== kakao.maps.services.Status.OK || !data || data.length === 0) {
            statusText.textContent = '검색 결과가 없습니다.';
            return;
          }

          renderPlaces(data, categoryCode);
          statusText.textContent = `총 ${data.length}개의 결과를 찾았습니다.`;
        },
        {
          location: location,
          radius: 1500,
          sort: kakao.maps.services.SortBy.DISTANCE
        }
      );
    }

    function renderPlaces(places, categoryCode) {
      const bounds = new kakao.maps.LatLngBounds();

      places.forEach(function (place) {
        const lat = parseFloat(place.y);
        const lng = parseFloat(place
