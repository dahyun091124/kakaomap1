<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>학교 주변 맛집 지도</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .sidebar {
      width: 420px;
      background: white;
      border-right: 1px solid #ddd;
      overflow-y: auto;
    }

    .tabs {
      display: flex;
      height: 70px;
    }

    .tab-button {
      width: 50%;
      border: none;
      font-size: 18px;
      font-weight: bold;
      background: #eee;
      cursor: pointer;
    }

    .tab-button.active {
      background: #fee500;
      border-bottom: 4px solid #222;
    }

    .status {
      padding: 28px;
      color: #999;
      font-size: 20px;
      font-weight: bold;
    }

    .place-item {
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .place-item:hover {
      background: #f7f7f7;
    }

    .place-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .place-address {
      font-size: 14px;
      color: #555;
      margin-bottom: 4px;
    }

    .place-phone {
      font-size: 13px;
      color: #888;
    }

    #map {
      flex: 1;
      height: 100vh;
    }

    .info-box {
      padding: 8px;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="sidebar">
      <div class="tabs">
        <button class="tab-button active" id="westernTab">양식</button>
        <button class="tab-button" id="koreanTab">한식</button>
      </div>

      <div id="placeList">
        <div class="status">현재 위치를 확인하는 중입니다...</div>
      </div>
    </div>

    <div id="map"></div>

  </div>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1e632b5f3aa3734e98cfb9cd29e7c748&libraries=services&autoload=false"></script>

  <script>
    let map;
    let placeService;
    let infoWindow;
    let markers = [];
    let currentLocationMarker = null;

    let currentKeyword = "양식 맛집";

    // 위치 허용을 안 했을 때 사용할 기본 위치
    let searchPosition = new kakao.maps.LatLng(37.5665, 126.9780);

    const markerImages = {
      western: "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png",
      korean: "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png"
    };

    let currentFoodType = "western";

    kakao.maps.load(function () {
      const mapContainer = document.getElementById("map");

      const mapOption = {
        center: searchPosition,
        level: 4
      };

      map = new kakao.maps.Map(mapContainer, mapOption);
      placeService = new kakao.maps.services.Places();
      infoWindow = new kakao.maps.InfoWindow({ zIndex: 1 });

      document.getElementById("westernTab").addEventListener("click", function () {
        currentKeyword = "양식 맛집";
        currentFoodType = "western";
        changeTab(this);
        searchPlaces();
      });

      document.getElementById("koreanTab").addEventListener("click", function () {
        currentKeyword = "한식 맛집";
        currentFoodType = "korean";
        changeTab(this);
        searchPlaces();
      });

      // 처음 들어왔을 때 위치 허용창 띄우기
      requestCurrentLocation();
    });

    // 현재 위치 요청
    function requestCurrentLocation() {
      if (!navigator.geolocation) {
        document.getElementById("placeList").innerHTML =
          '<div class="status">현재 위치 기능을 사용할 수 없습니다.</div>';
        searchPlaces();
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function (position) {
          const latitude = position.coords.latitude;
          const longitude = position.coords.longitude;

          searchPosition = new kakao.maps.LatLng(latitude, longitude);

          map.setCenter(searchPosition);

          currentLocationMarker = new kakao.maps.Marker({
            map: map,
            position: searchPosition,
            title: "내 현재 위치"
          });

          searchPlaces();
        },
        function () {
          document.getElementById("placeList").innerHTML =
            '<div class="status">위치 권한이 거부되어 기본 위치로 검색합니다.</div>';

          searchPlaces();
        }
      );
    }

    // 장소 검색
    function searchPlaces() {
      removeMarkers();

      document.getElementById("placeList").innerHTML =
        '<div class="status">맛집 데이터를 가져오는 중입니다...</div>';

      placeService.keywordSearch(
        currentKeyword,
        placesSearchCallback,
        {
          location: searchPosition,
          radius: 1500
        }
      );
    }

    // 검색 결과 처리
    function placesSearchCallback(data, status) {
      if (status === kakao.maps.services.Status.OK) {
        displayPlaceList(data);

        const bounds = new kakao.maps.LatLngBounds();

        for (let i = 0; i < data.length; i++) {
          const marker = displayMarker(data[i]);
          bounds.extend(new kakao.maps.LatLng(data[i].y, data[i].x));
        }

        bounds.extend(searchPosition);
        map.setBounds(bounds);
      } else {
        document.getElementById("placeList").innerHTML =
          '<div class="status">검색 결과가 없습니다.</div>';
      }
    }

    // 왼쪽 식당 목록 표시
    function displayPlaceList(places) {
      const placeList = document.getElementById("placeList");
      placeList.innerHTML = "";

      for (let i = 0; i < places.length; i++) {
        const place = places[i];

        const item = document.createElement("div");
        item.className = "place-item";

        item.innerHTML = `
          <div class="place-name">${i + 1}. ${place.place_name}</div>
          <div class="place-address">${place.road_address_name || place.address_name}</div>
          <div class="place-phone">${place.phone || "전화번호 없음"}</div>
        `;

        item.addEventListener("click", function () {
          const position = new kakao.maps.LatLng(place.y, place.x);
          map.panTo(position);
          openInfoWindow(place, markers[i]);
        });

        placeList.appendChild(item);
      }
    }

    // 지도 마커 표시
    function displayMarker(place) {
      const position = new kakao.maps.LatLng(place.y, place.x);

      const imageSrc = markerImages[currentFoodType];
      const imageSize = new kakao.maps.Size(32, 32);
      const markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize);

      const marker = new kakao.maps.Marker({
        map: map,
        position: position,
        image: markerImage
      });

      kakao.maps.event.addListener(marker, "click", function () {
        openInfoWindow(place, marker);
      });

      markers.push(marker);
      return marker;
    }

    // 인포윈도우 열기
    function openInfoWindow(place, marker) {
      const content = `
        <div class="info-box">
          <strong>${place.place_name}</strong><br>
          ${place.road_address_name || place.address_name}<br>
          ${place.phone || "전화번호 없음"}
        </div>
      `;

      infoWindow.setContent(content);
      infoWindow.open(map, marker);
    }

    // 기존 마커 삭제
    function removeMarkers() {
      for (let i = 0; i < markers.length; i++) {
        markers[i].setMap(null);
      }

      markers = [];

      if (infoWindow) {
        infoWindow.close();
      }
    }

    // 탭 변경
    function changeTab(clickedButton) {
      const buttons = document.querySelectorAll(".tab-button");

      buttons.forEach(function (button) {
        button.classList.remove("active");
      });

      clickedButton.classList.add("active");
    }
  </script>
</body>
</html>
