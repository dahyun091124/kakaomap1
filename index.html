<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>학교 주변 맛집 서비스</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Malgun Gothic', sans-serif;
      overflow: hidden;
    }

    .main-container {
      display: flex;
      width: 100%;
      height: 100vh;
      position: relative;
    }

    #sidebar {
      width: 350px;
      height: 100%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ccc;
      background: #fff;
      z-index: 10;
      flex-shrink: 0;
    }

    .tab-container {
      display: flex;
      background: #f1f1f1;
      border-bottom: 2px solid #ddd;
    }

    .tab-button {
      flex: 1;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      font-weight: bold;
      background: #e9e9e9;
      border: none;
      outline: none;
      transition: 0.3s;
    }

    .tab-button:hover {
      background: #ddd;
    }

    .tab-button.active {
      background: #fee500;
      color: #000;
      border-bottom: 2px solid #333;
    }

    #result-list {
      flex: 1;
      overflow-y: auto;
    }

    .place-item {
      padding: 15px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .place-item:hover {
      background: #f9f9f9;
    }

    .place-item h4 {
      margin: 0 0 5px 0;
      color: #222;
      font-size: 15px;
    }

    .place-item p {
      margin: 2px 0;
      font-size: 12px;
      color: #666;
    }

    #map {
      flex: 1;
      height: 100%;
    }

    .info-window {
      padding: 10px;
      font-size: 12px;
      line-height: 1.5;
      min-width: 150px;
    }
  </style>
</head>

<body>

  <div class="main-container">
    <div id="sidebar">
      <div class="tab-container">
        <button class="tab-button active" onclick="switchCategory('양식', this)">양식</button>
        <button class="tab-button" onclick="switchCategory('한식', this)">한식</button>
      </div>
      <div id="result-list">
        <p style="padding: 20px; text-align: center; color: #999;">맛집 데이터를 가져오는 중입니다...</p>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://dns.daum.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1e632b5f3aa3734e98cfb9cd29e7c748&libraries=services&autoload=false"></script>

  <script>
    let mapObject;        
    let placeService;     
    let infoWindowObject; 
    let markerList = [];  
    let currentCenter;    
    let selectedKeyword = '양식'; 

    kakao.maps.load(function() {
      const container = document.getElementById("map");

      // 기본 중심점을 서울시청 근처 광화문 위도로 무조건 고정해서 강제 로드
      currentCenter = new kakao.maps.LatLng(37.566826, 126.9786567);

      const options = {
        center: currentCenter, 
        level: 5 
      };

      mapObject = new kakao.maps.Map(container, options);
      placeService = new kakao.maps.Services.Places(); 
      infoWindowObject = new kakao.maps.InfoWindow({ zIndex: 1 }); 

      // [핵심 변경] 위치 권한이고 뭐고 일단 무조건 주변 맛집부터 검색해서 리스트 채우기!
      searchPlaces();

      // 맛집 다 띄워놓고 나서, 백그라운드에서 조용히 현재 위치 권한 물어보기
      tryToGetMyLocation();
    });

    // 맛집 검색 함수
    function searchPlaces() {
      if (!placeService || !currentCenter) return;

      // 음식점(FD6) 중에서 현재 키워드(양식/한식)로 주변 2km 검색
      placeService.keywordSearch(selectedKeyword, placesSearchCallback, {
        location: currentCenter,
        radius: 2000,
        category_group_code: 'FD6'
      });
    }

    // 검색 결과 콜백 함수
    function placesSearchCallback(data, status) {
      const listContainer = document.getElementById('result-list');

      if (status === kakao.maps.Services.Status.OK) {
        displaySearchResults(data);
      } else if (status === kakao.maps.Services.Status.ZERO_RESULT) {
        listContainer.innerHTML = `<p style="padding: 20px; text-align: center; color: #999;">주변 반경 2km 내에 ${selectedKeyword} 매장이 없습니다.</p>`;
      } else {
        listContainer.innerHTML = '<p style="padding: 20px; text-align: center; color: #999;">맛집 데이터를 불러오지 못했습니다.</p>';
      }
    }

    // 검색 결과를 화면에 뿌리기
    function displaySearchResults(places) {
      const listContainer = document.getElementById('result-list');
      const bounds = new kakao.maps.LatLngBounds();

      listContainer.innerHTML = ''; 
      clearMarkers(); // 이전 마커 싹 지우기

      places.forEach((place) => {
        const placePosition = new kakao.maps.LatLng(place.y, place.x);
        
        const marker = createCategoryMarker(placePosition, selectedKeyword);
        const itemElement = createListItem(place);

        bounds.extend(placePosition);

        kakao.maps.event.addListener(marker, 'click', function() {
          showInfoWindow(marker, place);
        });

        itemElement.onclick = function() {
          showInfoWindow(marker, place);
          mapObject.panTo(placePosition);
        };

        listContainer.appendChild(itemElement);
      });

      // 검색결과 매장들이 한눈에 들어오도록 지도 시야각 재조정
      mapObject.setBounds(bounds);
    }

    // 현재 위치 가져오기 (오류 나거나 거부당해도 프로그램이 안 멈춤)
    function tryToGetMyLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const myPos = new kakao.maps.LatLng(lat, lng);

          currentCenter = myPos;
          mapObject.setCenter(myPos);

          // 현재 내 위치 표시용 빨간색 마커
          const centerMarkerImage = new kakao.maps.MarkerImage(
            'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png',
            new kakao.maps.Size(31, 35)
          );

          new kakao.maps.Marker({
            map: mapObject,
            position: myPos,
            image: centerMarkerImage,
            title: "내 현재 위치"
          });

          // 내 실제 위치 찾았으니 그 주변으로 맛집 갱신
          searchPlaces();
        }, function(error) {
          console.log("위치 정보 활용 동의 안 함 또는 에러. 기본 지도 위치 유지.");
        });
      }
    }

    // 탭 클릭 시 카테고리 전환
    function switchCategory(keyword, element) {
      const tabButtons = document.querySelectorAll('.tab-button');
      tabButtons.forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');

      selectedKeyword = keyword;
      infoWindowObject.close();

      searchPlaces();
    }

    // 맛집 마커 찍기
    function createCategoryMarker(position, keyword) {
      let markerImageUrl = '';

      if (keyword === '양식') {
        markerImageUrl = 'https://t1.daumcdn.net/localimg/localimages/07/2012/img/marker_p.png'; // 초록핀
      } else if (keyword === '한식') {
        markerImageUrl = 'https://t1.daumcdn.net/mapjsapi/images/2x/marker.png'; // 파란핀
      }

      const markerImage = new kakao.maps.MarkerImage(markerImageUrl, new kakao.maps.Size(30, 38));

      const marker = new kakao.maps.Marker({
        position: position,
        image: markerImage,
        map: mapObject
      });

      markerList.push(marker);
      return marker;
    }

    // 리스트 태그 생성
    function createListItem(place) {
      const el = document.createElement('div');
      el.className = 'place-item';
      el.innerHTML = `
        <h4>${place.place_name}</h4>
        <p>${place.road_address_name || place.address_name}</p>
        <p style="color: #2b82d9; font-weight: bold;">${place.phone || '연락처 없음'}</p>
      `;
      return el;
    }

    // 인포윈도우 팝업
    function showInfoWindow(marker, place) {
      const content = `
        <div class="info-window">
          <strong>${place.place_name}</strong><br>
          <span style="color:#666; font-size:11px;">${place.road_address_name || place.address_name}</span>
        </div>
      `;
      infoWindowObject.setContent(content);
      infoWindowObject.open(mapObject, marker);
    }

    // 기존 마커 지우기
    function clearMarkers() {
      markerList.forEach(marker => marker.setMap(null));
      markerList = [];
    }
  </script>

</body>
</html>
