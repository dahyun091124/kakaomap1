<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>학교 주변 맛집 지도</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .header {
      height: 50px;
      line-height: 50px;
      background-color: #fee500;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .tabs {
      display: flex;
      width: 100%;
      height: 50px;
    }

    .tab-button {
      width: 50%;
      border: none;
      font-size: 16px;
      cursor: pointer;
      background-color: #eeeeee;
    }

    .tab-button.active {
      background-color: #333333;
      color: white;
    }

    #map {
      width: 100%;
      height: calc(100vh - 100px);
    }

    .info-box {
      padding: 8px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="header">학교 주변 맛집 지도</div>

  <div class="tabs">
    <button class="tab-button active" id="westernTab">양식</button>
    <button class="tab-button" id="koreanTab">한식</button>
  </div>

  <div id="map"></div>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1e632b5f3aa3734e98cfb9cd29e7c748&libraries=services&autoload=false"></script>

  <script>
    let map;
    let placeService;
    let markers = [];
    let currentLocationMarker = null;
    let infoWindow;

    // 학교 위치 좌표
    const schoolPosition = new kakao.maps.LatLng(37.6584, 126.8320);

    // 카테고리별 마커 이미지
    const markerImages = {
      CT1: "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png",
      MT1: "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png"
    };

    kakao.maps.load(function () {
      // 지도 생성
      const mapContainer = document.getElementById("map");

      const mapOption = {
        center: schoolPosition,
        level: 4
      };

      map = new kakao.maps.Map(mapContainer, mapOption);

      // 장소 검색 객체 생성
      placeService = new kakao.maps.services.Places();

      // 인포윈도우 생성
      infoWindow = new kakao.maps.InfoWindow({
        zIndex: 1
      });

      // 탭 클릭 이벤트 연결
      document.getElementById("westernTab").addEventListener("click", function () {
        changeCategory("CT1", this);
      });

      document.getElementById("koreanTab").addEventListener("click", function () {
        changeCategory("MT1", this);
      });

      // 현재 위치 표시
      showCurrentLocation();

      // 처음에는 양식 탭 검색
      searchByCategory("CT1");
    });

    // 현재 위치 표시
    function showCurrentLocation() {
      if (!navigator.geolocation) {
        alert("현재 위치 기능을 사용할 수 없습니다.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function (position) {
          const latitude = position.coords.latitude;
          const longitude = position.coords.longitude;

          const currentPosition = new kakao.maps.LatLng(latitude, longitude);

          if (currentLocationMarker) {
            currentLocationMarker.setMap(null);
          }

          currentLocationMarker = new kakao.maps.Marker({
            map: map,
            position: currentPosition,
            title: "내 현재 위치"
          });
        },
        function () {
          alert("현재 위치 권한을 허용하면 내 위치가 표시됩니다.");
        }
      );
    }

    // 카테고리 검색
    function searchByCategory(categoryCode) {
      removeMarkers();

      placeService.categorySearch(
        categoryCode,
        placesSearchCallback,
        {
          location: schoolPosition,
          radius: 1000
        }
      );
    }

    // 검색 결과 처리
    function placesSearchCallback(data, status) {
      if (status === kakao.maps.services.Status.OK) {
        const bounds = new kakao.maps.LatLngBounds();

        for (let i = 0; i < data.length; i++) {
          displayMarker(data[i]);
          bounds.extend(new kakao.maps.LatLng(data[i].y, data[i].x));
        }

        map.setBounds(bounds);
      } else {
        alert("검색 결과가 없습니다.");
      }
    }

    // 마커 표시
    function displayMarker(place) {
      const position = new kakao.maps.LatLng(place.y, place.x);

      const imageSrc = getMarkerImage(place.category_group_code);
      const imageSize = new kakao.maps.Size(32, 32);
      const markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize);

      const marker = new kakao.maps.Marker({
        map: map,
        position: position,
        image: markerImage
      });

      kakao.maps.event.addListener(marker, "click", function () {
        const content = `
          <div class="info-box">
            <strong>${place.place_name}</strong><br>
            ${place.road_address_name || place.address_name}<br>
            ${place.phone || "전화번호 없음"}
          </div>
        `;

        infoWindow.setContent(content);
        infoWindow.open(map, marker);
      });

      markers.push(marker);
    }

    // 카테고리별 마커 이미지 선택
    function getMarkerImage(categoryCode) {
      return markerImages[categoryCode] || markerImages.CT1;
    }

    // 기존 마커 삭제
    function removeMarkers() {
      for (let i = 0; i < markers.length; i++) {
        markers[i].setMap(null);
      }

      markers = [];

      if (infoWindow) {
        infoWindow.close();
      }
    }

    // 탭 변경
    function changeCategory(categoryCode, clickedButton) {
      const tabButtons = document.querySelectorAll(".tab-button");

      tabButtons.forEach(function (button) {
        button.classList.remove("active");
      });

      clickedButton.classList.add("active");

      searchByCategory(categoryCode);
    }
  </script>
</body>
</html>
