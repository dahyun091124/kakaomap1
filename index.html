<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>학교 주변 맛집 서비스</title>

  <style>
    /* 기본 여백 초기화 및 화면 가득 채우기 */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Malgun Gothic', sans-serif;
      overflow: hidden;
    }

    /* 전체 화면을 왼쪽(사이드바)과 오른쪽(지도)으로 나란히 분할 */
    .main-container {
      display: flex;
      width: 100%;
      height: 100vh;
      position: relative;
    }

    /* 왼쪽 사이드바: 반드시 고정 너비를 주고 flex-direction을 설정 */
    #sidebar {
      width: 350px;
      height: 100%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ccc;
      background: #fff;
      z-index: 10; /* 지도보다 위에 보이도록 레이어 순서 지정 */
      flex-shrink: 0; /* 화면이 줄어들어도 사이드바 너비 유지 */
    }

    /* 카테고리 탭 디자인 */
    .tab-container {
      display: flex;
      background: #f1f1f1;
      border-bottom: 2px solid #ddd;
    }

    .tab-button {
      flex: 1;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      font-weight: bold;
      background: #e9e9e9;
      border: none;
      outline: none;
      transition: 0.3s;
    }

    .tab-button:hover {
      background: #ddd;
    }

    .tab-button.active {
      background: #fee500; /* 카카오 노란색 */
      color: #000;
      border-bottom: 2px solid #333;
    }

    /* 검색 결과 리스트 영역: 내용이 많아지면 스크롤 생성 */
    #result-list {
      flex: 1;
      overflow-y: auto;
    }

    .place-item {
      padding: 15px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .place-item:hover {
      background: #f9f9f9;
    }

    .place-item h4 {
      margin: 0 0 5px 0;
      color: #222;
      font-size: 15px;
    }

    .place-item p {
      margin: 2px 0;
      font-size: 12px;
      color: #666;
    }

    /* 오른쪽 지도 영역: 남은 공간을 다 차지하도록 설정 */
    #map {
      flex: 1;
      height: 100%;
    }

    /* 인포윈도우(팝업창) 디자인 */
    .info-window {
      padding: 10px;
      font-size: 12px;
      line-height: 1.5;
      min-width: 150px;
    }
  </style>
</head>

<body>

  <div class="main-container">
    <div id="sidebar">
      <div class="tab-container">
        <button class="tab-button active" onclick="switchCategory('CT1', this)">양식</button>
        <button class="tab-button" onclick="switchCategory('MT1', this)">한식</button>
      </div>
      <div id="result-list">
        <p style="padding: 20px; text-align: center; color: #999;">주변 맛집을 불러오는 중입니다...</p>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1e632b5f3aa3734e98cfb9cd29e7c748&libraries=services&autoload=false"></script>

  <script>
    let mapObject;        // 지도 객체
    let placeService;     // 장소 검색 서비스 객체
    let infoWindowObject; // 마커 클릭 팝업 객체
    let markerList = [];  // 현재 지도에 표시된 마커 배열
    let currentCenter;    // 현재 내 위치 좌표
    let selectedCategory = 'CT1'; // 선택된 카테고리 코드 (기본값: 양식)

    // API 로드 후 안전하게 시작
    kakao.maps.load(function() {
      const container = document.getElementById("map");

      const options = {
        center: new kakao.maps.LatLng(37.5665, 126.9780), // 기본 중심점 (서울시청)
        level: 5 // 요구사항 확대 레벨 5
      };

      mapObject = new kakao.maps.Map(container, options);
      placeService = new kakao.maps.Services.Places(); 
      infoWindowObject = new kakao.maps.InfoWindow({ zIndex: 1 }); 

      // 위치 기반 주변 맛집 탐색 시작
      getCurrentLocation();
    });

    // 내 현재 위치 탐색 함수
    function getCurrentLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          currentCenter = new kakao.maps.LatLng(lat, lng);

          // 내 위치로 지도 이동
          mapObject.setCenter(currentCenter);

          // 내 위치 전용 붉은색 마커 표시
          const centerMarkerImage = new kakao.maps.MarkerImage(
            'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png',
            new kakao.maps.Size(31, 35)
          );

          new kakao.maps.Marker({
            map: mapObject,
            position: currentCenter,
            image: centerMarkerImage,
            title: "내 현재 위치"
          });

          // 첫 번째 카테고리 맛집 검색
          searchPlacesByCategory();
        }, function(error) {
          alert("위치 권한을 허용하셔야 주변 식당 목록이 표시됩니다.");
          currentCenter = mapObject.getCenter(); // 거부 시 기본 좌표 사용
          searchPlacesByCategory();
        });
      }
    }

    // 탭 클릭 시 카테고리 변경 및 마커 리셋 함수
    function switchCategory(categoryCode, element) {
      const tabButtons = document.querySelectorAll('.tab-button');
      tabButtons.forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');

      selectedCategory = categoryCode;

      // 새 데이터를 받기 전 기존 흔적(마커, 팝업)을 완전히 지우기
      clearMarkers();
      infoWindowObject.close();

      searchPlacesByCategory();
    }

    // 카테고리 검색 요청 함수
    function searchPlacesByCategory() {
      if (!currentCenter) return;

      // 내 위치 중심 반경 2km 이내에서 해당 카테고리 코드 검색
      placeService.categorySearch(selectedCategory, placesSearchCallback, {
        location: currentCenter,
        radius: 2000
      });
    }

    // 검색 완료 콜백 함수
    function placesSearchCallback(data, status) {
      const listContainer = document.getElementById('result-list');

      if (status === kakao.maps.Services.Status.OK) {
        displaySearchResults(data);
      } else if (status === kakao.maps.Services.Status.ZERO_RESULT) {
        listContainer.innerHTML = '<p style="padding: 20px; text-align: center; color: #999;">주변 반경에 매장이 없습니다.</p>';
      } else {
        alert('데이터 로드 오류가 발생했습니다.');
      }
    }

    // 결과를 화면과 지도에 그리는 함수
    function displaySearchResults(places) {
      const listContainer = document.getElementById('result-list');
      const bounds = new kakao.maps.LatLngBounds();

      listContainer.innerHTML = ''; // 기존 목록 초기화

      places.forEach((place) => {
        const placePosition = new kakao.maps.LatLng(place.y, place.x);
        
        // 카테고리 구별 마커 생성
        const marker = createCategoryMarker(placePosition, selectedCategory);
        const itemElement = createListItem(place);

        bounds.extend(placePosition);

        // 마커 클릭 시 팝업 연동
        kakao.maps.event.addListener(marker, 'click', function() {
          showInfoWindow(marker, place);
        });

        // 리스트 클릭 시 이동 및 팝업 연동
        itemElement.onclick = function() {
          showInfoWindow(marker, place);
          mapObject.panTo(placePosition);
        };

        listContainer.appendChild(itemElement);
      });

      // 모든 검색 결과가 잘 보이도록 지도 시야 자동 조정
      mapObject.setBounds(bounds);
    }

    // 카테고리별 마커 이미지 생성 함수
    function createCategoryMarker(position, category) {
      let markerImageUrl = '';

      if (category === 'CT1') {
        // 양식(CT1)일 때는 초록 깃발 모양 마커
        markerImageUrl = 'https://t1.daumcdn.net/localimg/localimages/07/2012/img/marker_p.png';
      } else if (category === 'MT1') {
        // 한식(MT1)일 때는 파란색 기본 물방울 마커
        markerImageUrl = 'https://t1.daumcdn.net/mapjsapi/images/2x/marker.png';
      }

      const markerImage = new kakao.maps.MarkerImage(markerImageUrl, new kakao.maps.Size(30, 38));

      const marker = new kakao.maps.Marker({
        position: position,
        image: markerImage,
        map: mapObject
      });

      markerList.push(marker);
      return marker;
    }

    // 리스트 아이템 레이아웃 구조 생성 함수
    function createListItem(place) {
      const el = document.createElement('div');
      el.className = 'place-item';
      el.innerHTML = `
        <h4>${place.place_name}</h4>
        <p>${place.road_address_name || place.address_name}</p>
        <p style="color: #2b82d9; font-weight: bold;">${place.phone || '연락처 없음'}</p>
      `;
      return el;
    }

    // 팝업창(인포윈도우) 표시 함수
    function showInfoWindow(marker, place) {
      const content = `
        <div class="info-window">
          <strong>${place.place_name}</strong><br>
          <span style="color:#666; font-size:11px;">${place.road_address_name || place.address_name}</span>
        </div>
      `;
      infoWindowObject.setContent(content);
      infoWindowObject.open(mapObject, marker);
    }

    // 이전 마커들 지도에서 완전히 제거하는 함수
    function clearMarkers() {
      markerList.forEach(marker => marker.setMap(null));
      markerList = [];
    }
  </script>

</body>
</html>
